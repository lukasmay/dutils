version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: dutils
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: dutils
    ldflags:
      - -s -w -X github.com/lukasmay/dutils/cmd.Version={{.Version}}

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

nfpms:
  - id: dutils
    package_name: dutils
    vendor: Lukas May
    maintainer: "Lukas May <lukasmay@users.noreply.github.com>"
    homepage: https://github.com/lukasmay/dutils
    description: Docker and Docker Compose workflow simplifier
    license: Apache-2.0
    formats:
      - deb
    bindir: /usr/bin

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

homebrew_casks:
  - name: dutils
    repository:
      owner: lukasmay
      name: homebrew-dutils
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/lukasmay/dutils"
    description: "Docker and Docker Compose workflow simplifier"
    license: "Apache-2.0"
    binaries:
      - dutils
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/dutils"]
          end
